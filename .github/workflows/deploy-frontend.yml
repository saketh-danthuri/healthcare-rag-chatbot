# ============================================
# Deploy Frontend to Azure Static Web Apps
# ============================================
# WHY: Automatically builds and deploys the Next.js frontend when
# changes are merged to main. Produces a static export (HTML/CSS/JS)
# and uploads to Azure Static Web Apps.
#
# TRIGGER: Push to main when frontend/ files change.
# NOTE: NEXT_PUBLIC_API_URL is baked in at build time (Next.js
#       inlines NEXT_PUBLIC_* env vars during static export).

name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"

# Prevent simultaneous frontend deployments
concurrency:
  group: deploy-frontend
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build static export
        run: |
          cd frontend
          npm run build
        env:
          NEXT_PUBLIC_API_URL: https://healthcare-ops.livelypebble-70fe60f2.eastus2.azurecontainerapps.io

      - name: Copy SWA config to output
        run: |
          cp frontend/staticwebapp.config.json frontend/out/

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend/out"
          skip_app_build: true
          skip_api_build: true

      - name: Deployment summary
        if: success()
        run: |
          echo "### Frontend Deployment Successful :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | https://black-water-04429680f.4.azurestaticapps.net |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${GITHUB_SHA::7}\` |" >> $GITHUB_STEP_SUMMARY
